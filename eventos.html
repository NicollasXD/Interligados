<title>Eventos</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="section">
  <div class="container">
    <div class="event-block">

      <div class="event-text">
        <h2>Interligados Por Elas</h2>
        <p>Mais do que um evento, foi um espaço de escuta, acolhimento e conscientização.</p>
      </div>

      <div class="gallery-grid">

        <button class="gallery-card">
          <img src="assets/eventoF1.png" alt="Interligados Por Elas 1">
        </button>

        <button class="gallery-card">
          <img src="assets/eventoF2.png" alt="Interligados Por Elas 2">
        </button>

        <button class="gallery-card">
          <img src="assets/eventoF3.png" alt="Interligados Por Elas 3">
        </button>

        </button>

          <img src="assets/eventoF5.png" alt="Interligados Por Elas 5">
        </button>

        <button class="gallery-card">
          <img src="assets/eventoF6.png" alt="Interligados Por Elas 6">
        </button>

        <button class="gallery-card">
          <img src="assets/eventoF7.png" alt="Interligados Por Elas 7">
        </button>

      </div>

    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="event-block">

      <div class="event-text">
        <h2>Dia das Crianças</h2>
        <p>Um dia de alegria, solidariedade e conexão com a comunidade.</p>
      </div>

      <div class="gallery-grid">

          <img src="assets/diadascriancas1.png" alt="Dia das Crianças 1">

        <button class="gallery-card">

          <img src="assets/diadascriancas5.png" alt="Dia das Crianças 5">
